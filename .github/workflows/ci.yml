name: CI
on:
  pull_request:
    branches: [master]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx playwright install
      - run: bunx astro sync
      - run: bun run check
      - name: Install Vale
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo errata-ai/vale --pattern 'vale_*_Linux_64-bit.tar.gz' --output /tmp/vale.tar.gz
          tar -xzf /tmp/vale.tar.gz -C /usr/local/bin vale
      - run: bun run prose
      - run: bun run test
      - run: bun run build
